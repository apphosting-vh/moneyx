<!-- ── Force-fresh: instruct browsers and proxies never to serve a stale copy ── -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma"        content="no-cache"/>
<meta http-equiv="Expires"       content="0"/>

<!-- ── PWA / Android TWA ──────────────────────────────────────── -->

<!-- SEO / share -->

<!-- Service Worker registration + auto-update detection -->
<script>
/* ══════════════════════════════════════════════════════════════════════
   ALWAYS-FRESH STRATEGY
   When online, this app must serve the latest deployed version.
   Three independent layers guarantee this:

   Layer 1 — Meta tags (above): tell the browser/proxy not to cache.
   Layer 2 — Service Worker: network-first for HTML, cache-first for CDN.
              Aggressive update checks (immediate + tab-focus + online).
   Layer 3 — Self-version fetch: independently compares the live page's
              APP_VERSION against the running version; fires update banner
              if they differ, even when the SW is absent or stale.
   ══════════════════════════════════════════════════════════════════════ */
(function(){

  /* ── LAYER 3: Self-version fetch ─────────────────────────────────────
     Runs immediately, before the SW is even registered.
     Fetches the live HTML with cache:'reload' (bypasses all caches,
     including any SW cache) and extracts the APP_VERSION string.
     If it differs from the version currently running in the page,
     dispatches mm:update-ready so the React banner appears.         */
  var _selfCheckDone = false;
  function selfVersionCheck() {
    if (_selfCheckDone || !navigator.onLine) return;
    _selfCheckDone = true;
    var currentVer = (window.__MM_APP_VERSION || '');
    fetch(location.href, { cache: 'reload', method: 'GET' })
      .then(function(r){ return r.text(); })
      .then(function(html){
        var m = html.match(/APP_VERSION\s*=\s*"([^"]+)"/);
        if (m && m[1] && currentVer && m[1] !== currentVer) {
          console.log('[MM] New version detected via self-check:', m[1], '(running:', currentVer, ')');
          window.dispatchEvent(new CustomEvent('mm:update-ready'));
        }
      })
      .catch(function(){});  // offline or CORS — silently ignore
  }

  /* Run on load and again whenever the tab becomes visible or reconnects */
  window.addEventListener('load', function(){ setTimeout(selfVersionCheck, 2000); });
  document.addEventListener('visibilitychange', function(){
    if (document.visibilityState === 'visible') { _selfCheckDone = false; selfVersionCheck(); }
  });
  window.addEventListener('online', function(){ _selfCheckDone = false; selfVersionCheck(); });

  /* ── LAYER 2: Service Worker ─────────────────────────────────────── */
  if (!('serviceWorker' in navigator)) return;

  window.__swReg = null;

  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(function(reg){
        window.__swReg = reg;
        console.log('[SW] Registered, scope:', reg.scope);

        function notifyUpdateReady() {
          window.dispatchEvent(new CustomEvent('mm:update-ready'));
        }

        /* ── Case A: SW already waiting on page load ── */
        if (reg.waiting) {
          console.log('[SW] Update already waiting on load');
          notifyUpdateReady();
        }

        /* ── Case B: New SW installs while page is open ── */
        reg.addEventListener('updatefound', function(){
          var newWorker = reg.installing;
          if (!newWorker) return;
          console.log('[SW] Update found — new worker installing');
          newWorker.addEventListener('statechange', function(){
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              console.log('[SW] New version installed and waiting');
              notifyUpdateReady();
            }
          });
        });

        /* ── Case C: Immediate update check on every fresh load ──
           Unlike the old 60-min poll, this fires straight away so
           visiting the page online always pulls a fresh sw.js.    */
        function swUpdate() {
          if (navigator.onLine) reg.update().catch(function(){});
        }
        swUpdate(); // fire immediately

        /* ── Case D: Tab regains focus (user switches back to the tab) ── */
        document.addEventListener('visibilitychange', function(){
          if (document.visibilityState === 'visible') swUpdate();
        });

        /* ── Case E: Device/browser comes back online ── */
        window.addEventListener('online', swUpdate);

        /* ── Case F: Periodic heartbeat — every 10 min for long sessions ── */
        setInterval(swUpdate, 10 * 60 * 1000);

        /* Messages from SW to React */
        navigator.serviceWorker.addEventListener('message', function(e){
          if (e.data && e.data.type === 'SYNC_PRICES') {
            window.dispatchEvent(new CustomEvent('mm:sync-prices'));
          }
        });

        /* controllerchange fires after skipWaiting() activates new SW */
        navigator.serviceWorker.addEventListener('controllerchange', function(){
          if (!window.__swReloaded) {
            window.__swReloaded = true;
            console.log('[SW] Controller changed — reloading for new version');
            window.location.reload();
          }
        });
      })
      .catch(function(err){
        console.warn('[SW] Registration failed:', err);
      });
  });
}());
</script>

<script>
/* ══════════════════════════════════════════════════════════════════════
   APP PROTECTION LAYER
   ══════════════════════════════════════════════════════════════════════ */
(function(){
  'use strict';

  /* ── 1. IFRAME LOCK ─────────────────────────────────────────────────
     Prevents clickjacking — the app cannot be embedded in another page. */
  if (window.self !== window.top) {
    document.documentElement.innerHTML = '';
    try { window.top.location = window.self.location; } catch(e) {}
    throw new Error('Embedding blocked');
  }

  /* ── 2. INJECTED EXTERNAL SCRIPT BLOCKER ─────────────────────────── */
  // Blocks <script src="..."> tags from unknown domains.
  // Inline scripts and Babel-transpiled scripts are explicitly allowed.
  window.addEventListener('DOMContentLoaded', function() {
    var TRUSTED = ['cdnjs.cloudflare.com', 'fonts.googleapis.com', 'fonts.gstatic.com', 'accounts.google.com'];
    var obs = new MutationObserver(function(muts) {
      muts.forEach(function(m) {
        m.addedNodes.forEach(function(node) {
          if (node.nodeName === 'SCRIPT' && node.src) {
            var trusted = TRUSTED.some(function(d) { return node.src.indexOf(d) !== -1; });
            if (!trusted) node.remove();
          }
        });
      });
    });
    obs.observe(document.documentElement, { childList: true, subtree: true });
  });

})();
</script>

<!-- ① preconnect to both font & JS CDNs — saves ~100ms per domain on first paint -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin/>
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com"/>

<!-- ③ Preload critical weights (logo/headings: Sora 700/800, body: DM Sans 400/500)
     as="style" fetches the CSS early; onload swaps rel to stylesheet non-blocking -->
<link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=DM+Sans:wght@400;500&family=Nunito:wght@700;800;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"/>

<!-- ④ Full font set — non-render-blocking via preload→stylesheet swap
     &display=swap is preserved so Google Fonts injects font-display:swap into
     every @font-face rule it returns, eliminating invisible-text flash (FOIT) -->
<link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Nunito:wght@700;800;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"/>
<!-- Fallback for browsers that don't support preload (≈ 0.5 % share) -->
<noscript>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Nunito:wght@700;800;900&display=swap"/>
</noscript>

<!-- ⑤ Explicit @font-face font-display:swap for system fallbacks while Google Fonts loads -->
<style>
/* Guarantee swap behaviour even before the Google Fonts CSS arrives */
@font-face{font-family:'Sora';font-style:normal;font-weight:700 800;font-display:swap;src:local('Sora')}
@font-face{font-family:'DM Sans';font-style:normal;font-weight:400 500;font-display:swap;src:local('DM Sans')}
</style>
<!-- defer: all three download in parallel, execute in declaration order after the
     DOM is fully parsed but before DOMContentLoaded fires — which is exactly when
     Babel scans for <script type="text/babel"> and transpiles the app. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin defer></script>
<!-- Babel loads last; defer ensures DOM is fully parsed before transpilation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" defer></script>
<!-- Preload Babel so it downloads in parallel with React without delaying FCP -->
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" as="script" crossorigin/>
<!-- Google Identity Services — for Google Drive cloud sync (token-only, no sign-in) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

/* ── Safe-area insets: Android edge-to-edge & notch/cutout support ── */
*,*::before,*::after{box-sizing:border-box}
html{
  /* Extend background behind status bar and nav bar */
  background:#05080f;
  /* Prevent tap highlight on Android */
  -webkit-tap-highlight-color:transparent;
}
body{
  /* Push content away from system bars using env() safe areas */
  padding-top:    env(safe-area-inset-top,    0px);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  padding-left:   env(safe-area-inset-left,   0px);
  padding-right:  env(safe-area-inset-right,  0px);
  /* Prevent overscroll glow on Android */
  overscroll-behavior: none;
  /* Full viewport */
  min-height: 100dvh;
  /* Disable text selection for app-like feel */
  -webkit-user-select: none;
  user-select: none;
}
/* Re-enable selection in inputs and text areas */
input, textarea, [contenteditable] {
  -webkit-user-select: text;
  user-select: text;
}
/* Scrollbar styling for Android WebView */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
/* ── Performance: CSS containment ── */
/* Contain layout/paint for card containers — prevents full-page reflows */
.card-container, .stat-card { contain: layout style; }
/* Content-visibility for long scrollable lists — skips offscreen layout/paint */
.scroll-list { content-visibility: auto; contain-intrinsic-size: auto 500px; }
/* Prevent layout thrashing on animated elements */
#mm-splash .sp-letter { will-change: transform, opacity, filter; }
#mm-splash .sp-rupee { will-change: background-position; }
#mm-splash .sp-underline { will-change: transform; }
/* Disable expensive effects on low-power devices */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

  --subnav-bg: linear-gradient(90deg,rgba(255,255,255,0.13),rgba(255,255,255,0.04));

@media print{
  /* ── Block Ctrl+P unless controlled export mode is active ── */
  html:not([data-mm-printing]) body * { visibility: hidden !important; }
  html:not([data-mm-printing]) body::after {
    visibility: visible !important;
    content: "Printing is disabled for this application.";
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 20px; font-family: sans-serif; color: #333;
  }
  /* ── Controlled PDF export: show only the report print area ── */
  html[data-mm-printing] * { visibility: hidden !important; }
  html[data-mm-printing] #rpt-print-area,
  html[data-mm-printing] #rpt-print-area * { visibility: visible !important; }
  html[data-mm-printing] #rpt-print-area {
    /* Reflow to top-left so content fills the page naturally */
    position: absolute !important; top: 0 !important; left: 0 !important;
    width: 210mm !important; overflow: visible !important;
    padding: 0 !important; margin: 0 !important;
    /* Force light palette so charts & text are readable on white paper */
    --bg: #ffffff; --bg2: #f8f9fa; --bg3: #f1f5f9; --bg4: #e2e8f0;
    --card: #ffffff; --card2: #f8fafc; --card3: #f0f4f8;
    --border: #cbd5e1; --border2: #e2e8f0;
    --text: #0f172a; --text2: #1e293b; --text3: #334155;
    --text4: #475569; --text5: #64748b; --text6: #94a3b8;
    --accent: #1d4ed8; --accentbg: #eff6ff; --accentbg2: #dbeafe; --accentbg3: #bfdbfe;
    --inp-bg: #f8fafc; --scrollbar: #cbd5e1; --subnav-bg: #eff6ff;
    background: #ffffff !important;
  }
  html[data-mm-printing] .no-print { display: none !important; visibility: hidden !important; }
  /* Ensure cards & section backgrounds render correctly */
  html[data-mm-printing] #rpt-print-area .card,
  html[data-mm-printing] #rpt-print-area [class*="card"] { background: #ffffff !important; border: 1px solid #e2e8f0 !important; box-shadow: none !important; }
  /* A4 page setup */
  @page { size: A4 portrait; margin: 14mm 12mm 14mm 12mm; }
}

/* ── Nav colour variables ─────────────────────────────────────────────
   --nic       = vivid item colour (e.g. #fbbf24)
   --nic-glow  = same colour at ~30% alpha  (rgba)
   --nic-soft  = same colour at ~14% alpha  (rgba)
   Set on each nav button element inline. ─────────────────────────── */

/* ── Collapsed sidebar: active icon — vivid per-item colour ── */
.nb-icon-active{
  background:linear-gradient(135deg,var(--nic-glow),var(--nic-soft))!important;
  color:var(--nic,var(--accent))!important;
  box-shadow:0 0 0 2px var(--nic-glow),0 4px 18px var(--nic-glow);
}

/* ── Full sidebar: active button — vivid per-item sweep + glowing border ── */
.nb-full-active{
  background:linear-gradient(90deg,var(--nic-soft) 0%,rgba(0,0,0,.04) 70%,transparent 100%)!important;
  color:var(--nic,var(--accent))!important;
  border-left:3px solid var(--nic,var(--accent))!important;
  font-weight:700!important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    inset 0 -1px 0 rgba(255,255,255,.03),
    0 2px 18px var(--nic-soft)!important;
}
/* Icon inside the active full-sidebar row */
.nb-full-active>svg,.nb-full-active [data-nav-icon]{
  filter:drop-shadow(0 0 5px var(--nic-glow));
}
@media(max-width:768px){
  .mobile-content-panel{padding:14px 10px 32px!important;}
  /* Toolbar wraps on mobile */
  .tb-toolbar{flex-wrap:wrap!important;}
  /* Hide ledger table on mobile - use card list instead */
  .ldg-table-hdr{display:none!important;}
  .ldg-mobile-card{display:flex!important;}
  .ldg-desktop-row{display:none!important;}
  /* Responsive 2-column grids in modals — collapse to 1-col on small screens */
  .tx-grid-2col{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  /* Scrollable tables on mobile — prevent overflow */
  .mobile-scroll-table{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    border-radius:9px;
  }
  /* Fixed-width grid tables that overflow on mobile get a horizontal scrollbar */
  .mobile-scroll-table > div[style*="minWidth"]{
    min-width:0 !important;
  }
  /* Modal 2-column grids → single column on narrow screens */
  .tx-grid-2col{
    grid-template-columns:1fr !important;
  }
}
  /* Modal backdrop: on mobile, offset left by sidebar width (64px) so modal
     centers within the content area, not the full viewport */
  @media (max-width: 768px) {
    /* Modal should cover full viewport on mobile — no sidebar offset */
    .modal-bd {
      left: 0 !important;
    }
    /* Ensure modal inner content uses full available width */
    .modal-bd .fu {
      width: 100%;
      max-width: 100% !important;
      /* Constrain height on small screens so long modals scroll internally */
      max-height: calc(100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 48px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    /* Prevent modal content from exceeding screen width */
    .modal-bd .fu > div {
      max-width: 100% !important;
      box-sizing: border-box;
    }
  }
  /* Tight mobile: further constrain modals to viewport */
  @media (max-width: 420px) {
    .modal-bd {
      padding: 8px 4px !important;
    }
    .modal-bd .fu {
      padding: 16px 12px !important;
    }
  }
  /* Responsive 2-column grid inside modals: 2-col on desktop, 1-col on mobile */
  .grid-2col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 520px) {
    .modal-bd .grid-2col {
      grid-template-columns: 1fr;
    }
  }

.tax-wrap {

  --itr-bg:        var(--bg);

  --itr-surface3:  var(--bg4);

  --itr-text:      var(--text);

/* ══════════════════════════════════════════════════════════════════════════
   SELECTION SIGNATURE SYSTEM
   One vivid accent treatment echoes the sidebar nav-bar active style across
   every selection state in the app:
     • accent label colour   (vivid, not muted)
     • border strip          (3px solid at the active edge)
     • gradient tint bg      (from accentbg at edge → transparent/accentbg2)
     • ambient glow shadow   (soft accentbg5 halo)
   Three utility classes + ::selection pseudo-element.
   ══════════════════════════════════════════════════════════════════════════ */
@keyframes mm-sel-pop{0%{opacity:.7;transform:scale(.97)}60%{transform:scale(1.015)}100%{opacity:1;transform:scale(1)}}

/* ── Text highlight (browser ::selection) ─────────────────────────────── */
::selection{background:var(--accentbg5);color:var(--accent);}
::-moz-selection{background:var(--accentbg5);color:var(--accent);}

/* ── Horizontal tab — bottom border strip, top→bottom tint ───────────── */
.mm-tab-sel{
  background:linear-gradient(180deg,var(--accentbg),var(--accentbg2))!important;
  color:var(--accent)!important;
  font-weight:700!important;
  border-bottom:3px solid var(--accent)!important;
  box-shadow:0 3px 16px var(--accentbg5)!important;
  position:relative;
  animation:mm-sel-pop .2s ease both;
}
.mm-tab-sel::after{
  content:'';position:absolute;bottom:0;left:10%;right:10%;
  height:3px;background:var(--accent);
  border-radius:2px 2px 0 0;
  box-shadow:0 0 10px var(--accentbg5),0 0 4px var(--accent);
  pointer-events:none;
}

/* ── Pill / chip — full accent border + glow ring ─────────────────────── */
.mm-pill-sel{
  background:linear-gradient(135deg,var(--accentbg),var(--accentbg2))!important;
  color:var(--accent)!important;
  font-weight:700!important;
  border:1.5px solid var(--accent)!important;
  box-shadow:0 0 0 3px var(--accentbg5),0 2px 12px var(--accentbg5)!important;
  animation:mm-sel-pop .2s ease both;
}

/* ── List row — left border sweep (mirrors full nav bar active) ─────────── */
.mm-row-sel{
  background:linear-gradient(90deg,var(--accentbg),var(--accentbg2) 55%,transparent 100%)!important;
  color:var(--accent)!important;
  font-weight:600!important;
  border-left:3px solid var(--accent)!important;
  box-shadow:inset 3px 0 12px var(--accentbg5)!important;
  animation:mm-sel-pop .2s ease both;
}

  from{transform:translateX(-50%)}
  to{transform:translateX(0)}
}
@keyframes sp-star-twinkle{
  0%,100%{opacity:.1;transform:scale(.8)}
  50%{opacity:.6;transform:scale(1.2)}
}
@keyframes sp-blob-morph{
  0%{border-radius:42% 58% 70% 30% / 45% 45% 55% 55%}
  25%{border-radius:70% 30% 50% 50% / 30% 60% 40% 70%}
  50%{border-radius:30% 70% 40% 60% / 55% 30% 70% 45%}
  75%{border-radius:55% 45% 60% 40% / 40% 70% 30% 60%}
  100%{border-radius:42% 58% 70% 30% / 45% 45% 55% 55%}
}
@keyframes sp-ring-pulse{
  0%{transform:translate(-50%,-50%) scale(1);opacity:.15}
  100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}
}
@keyframes sp-logo-breathe{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.02)}
}
@keyframes sp-hex-spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(60deg)}
}
@keyframes sp-particle-drift{
  0%{transform:translate(0,0);opacity:0}
  10%{opacity:.6}
  90%{opacity:.6}
  100%{transform:translate(var(--drift-x,50px),var(--drift-y,-80px));opacity:0}
}
@keyframes sp-scan-line{
  0%{top:-2px}
  100%{top:100%}
}

/* ── ROOT CONTAINER ─────────────────────────────────── */
#mm-splash{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;
  font-family:'Nunito',sans-serif;
  z-index:9999;
  background:#06060e;
  animation:sp-bg-dark 16s ease-in-out infinite;
}

/* ── MESH GRADIENT LAYERS ───────────────────────────── */
.sp-mesh{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.sp-mesh-blob{
  position:absolute;border-radius:50%;
  filter:blur(80px);
  opacity:.35;
  mix-blend-mode:screen;
}
.sp-mesh-1{
  width:600px;height:600px;
  top:-15%;left:-10%;
  background:radial-gradient(circle,rgba(201,162,39,.15),transparent 70%);
  animation:sp-mesh-move 20s ease-in-out infinite;
}
.sp-mesh-2{
  width:500px;height:500px;
  bottom:-10%;right:-10%;
  background:radial-gradient(circle,rgba(100,80,220,.12),transparent 70%);
  animation:sp-mesh-move2 25s ease-in-out infinite;
}
.sp-mesh-3{
  width:400px;height:400px;
  top:40%;left:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(201,162,39,.08),transparent 60%);
  animation:sp-mesh-move3 18s ease-in-out infinite;
}
.sp-mesh-4{
  width:350px;height:350px;
  top:10%;right:15%;
  background:radial-gradient(circle,rgba(60,120,200,.08),transparent 60%);
  animation:sp-mesh-move 22s ease-in-out infinite reverse;
}
.sp-mesh-5{
  width:300px;height:300px;
  bottom:20%;left:20%;
  background:radial-gradient(circle,rgba(180,100,255,.06),transparent 60%);
  animation:sp-mesh-move2 15s ease-in-out infinite;
}

/* ── DOT MATRIX GRID ────────────────────────────────── */
.sp-grid{
  position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(200,200,255,.04) 1px,transparent 1px);
  background-size:32px 32px;
  animation:sp-pattern-pulse 8s ease-in-out infinite;
}

/* ── SCAN LINE ──────────────────────────────────────── */
.sp-scanline{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(201,162,39,.06),transparent);
  pointer-events:none;
  animation:sp-scan-line 8s linear infinite;
  z-index:1;
}

/* ── AURORA WAVES (BOTTOM) ──────────────────────────── */
.sp-aurora-wrap{
  position:absolute;bottom:0;left:0;right:0;height:200px;
  pointer-events:none;overflow:hidden;
}
.sp-aurora{
  position:absolute;bottom:0;left:0;
  width:200%;height:100%;
  background:linear-gradient(180deg,
    transparent 0%,
    rgba(201,162,39,.03) 30%,
    rgba(100,80,220,.04) 50%,
    rgba(201,162,39,.02) 70%,
    transparent 100%
  );
  animation:sp-aurora 12s ease-in-out infinite;
}
.sp-aurora-2{
  animation:sp-aurora2 15s ease-in-out infinite;
  opacity:.5;
  background:linear-gradient(180deg,
    transparent 0%,
    rgba(60,120,200,.03) 30%,
    rgba(201,162,39,.02) 60%,
    transparent 100%
  );
}

/* ── MORPHING BLOBS ─────────────────────────────────── */
.sp-blob{
  position:absolute;pointer-events:none;
  opacity:.06;
  animation:sp-blob-morph 15s ease-in-out infinite;
}
.sp-blob-1{
  width:300px;height:300px;top:10%;left:5%;
  background:linear-gradient(135deg,#c9a227,#6450dc);
  animation-delay:0s;
}
.sp-blob-2{
  width:250px;height:250px;bottom:15%;right:8%;
  background:linear-gradient(135deg,#3c78c8,#c9a227);
  animation-delay:-5s;
}
.sp-blob-3{
  width:200px;height:200px;top:55%;left:60%;
  background:linear-gradient(135deg,#b464ff,#3c78c8);
  animation-delay:-10s;
}

/* ── STAR FIELD ─────────────────────────────────────── */
.sp-stars{position:absolute;inset:0;pointer-events:none}
.sp-star{
  position:absolute;width:2px;height:2px;
  background:#e8e6f0;border-radius:50%;
  animation:sp-star-twinkle var(--twinkle,3s) ease-in-out infinite;
  animation-delay:var(--delay,0s);
}

/* ── FLOATING PARTICLES ─────────────────────────────── */
.sp-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.sp-particle{
  position:absolute;width:3px;height:3px;
  background:rgba(201,162,39,.3);border-radius:50%;
  animation:sp-particle-drift var(--dur,8s) ease-in-out infinite;
  animation-delay:var(--pdelay,0s);
  left:var(--px,50%);top:var(--py,50%);
}

/* ── CONCENTRIC RINGS (around logo) ─────────────────── */
.sp-rings{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:1;
}
.sp-ring{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  border:1px solid rgba(201,162,39,.08);
  animation:sp-ring-pulse var(--ring-dur,4s) ease-out infinite;
  animation-delay:var(--ring-delay,0s);
}

/* ── DATA TICKER STRIPS ─────────────────────────────── */
.sp-ticker-wrap{
  position:absolute;left:0;right:0;
  overflow:hidden;pointer-events:none;
  height:24px;
  z-index:2;
}
.sp-ticker-top{top:48px}
.sp-ticker-bottom{bottom:48px}
.sp-ticker{
  display:flex;gap:40px;align-items:center;
  white-space:nowrap;
  animation:sp-ticker 40s linear infinite;
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:1px;
  color:rgba(200,200,255,.12);
  font-weight:500;
}
.sp-ticker-rev{animation:sp-ticker-reverse 35s linear infinite}
.sp-ticker .sp-t-sep{
  width:4px;height:4px;border-radius:50%;
  background:rgba(201,162,39,.2);flex-shrink:0;
}
.sp-ticker .sp-t-up{color:rgba(100,220,120,.2)}
.sp-ticker .sp-t-down{color:rgba(220,100,100,.15)}

/* ── VERTICAL TICKERS ───────────────────────────────── */
.sp-vticker-wrap{
  position:absolute;top:80px;bottom:80px;
  overflow:hidden;pointer-events:none;
  width:24px;z-index:2;
}
.sp-vticker-left{left:20px}
.sp-vticker-right{right:20px}
.sp-vticker{
  display:flex;flex-direction:column;gap:28px;align-items:center;
  animation:sp-ticker 30s linear infinite;
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:2px;
  color:rgba(200,200,255,.08);font-weight:600;
  writing-mode:vertical-rl;
  text-orientation:mixed;
}
.sp-vticker-rev{animation:sp-ticker-reverse 25s linear infinite}

/* ── CORNER ACCENTS (enhanced) ──────────────────────── */
.sp-corner{position:absolute;pointer-events:none;z-index:2}
.sp-corner-tl{top:30px;left:30px;width:70px;height:70px;border-top:2px solid rgba(201,162,39,.12);border-left:2px solid rgba(201,162,39,.12)}
.sp-corner-tr{top:30px;right:30px;width:70px;height:70px;border-top:2px solid rgba(201,162,39,.12);border-right:2px solid rgba(201,162,39,.12)}
.sp-corner-bl{bottom:30px;left:30px;width:70px;height:70px;border-bottom:2px solid rgba(201,162,39,.12);border-left:2px solid rgba(201,162,39,.12)}
.sp-corner-br{bottom:30px;right:30px;width:70px;height:70px;border-bottom:2px solid rgba(201,162,39,.12);border-right:2px solid rgba(201,162,39,.12)}
.sp-corner-tl::after,.sp-corner-tr::after,.sp-corner-bl::after,.sp-corner-br::after{
  content:'';position:absolute;width:6px;height:6px;border-radius:50%;
  background:rgba(201,162,39,.2);
}
.sp-corner-tl::after{top:-3px;left:-3px}
.sp-corner-tr::after{top:-3px;right:-3px}
.sp-corner-bl::after{bottom:-3px;left:-3px}
.sp-corner-br::after{bottom:-3px;right:-3px}

/* ── ACCENT STRIPES ─────────────────────────────────── */
.sp-stripe{position:absolute;height:3px;border-radius:2px;overflow:hidden;pointer-events:none;z-index:2}
.sp-stripe::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,#c9a227,#e8c547,#c9a227,transparent);
  animation:sp-stripe 4s ease-in-out infinite;
}
.sp-stripe-1{top:28%;left:3%;width:100px;animation:sp-stripe 4s ease-in-out infinite}
.sp-stripe-2{bottom:32%;right:5%;width:80px;animation:sp-stripe 4s ease-in-out infinite 1.5s}
.sp-stripe-3{top:58%;left:8%;width:60px;animation:sp-stripe 4s ease-in-out infinite 2.5s}
.sp-stripe-4{top:15%;right:3%;width:50px;animation:sp-stripe 4s ease-in-out infinite 3s}
.sp-stripe-5{bottom:18%;left:5%;width:70px;animation:sp-stripe 4s ease-in-out infinite 0.8s}

/* ── HORIZONTAL DIVIDERS ────────────────────────────── */
.sp-hdiv{position:absolute;height:1px;pointer-events:none;background:linear-gradient(90deg,transparent,rgba(200,200,255,.04),transparent);left:3%;right:3%;z-index:1}
.sp-hdiv-1{top:18%;animation:sp-fadein 1s 2.2s ease both}
.sp-hdiv-2{top:82%;animation:sp-fadein 1s 2.5s ease both}
.sp-hdiv-3{top:33%;animation:sp-fadein 1s 2.8s ease both}
.sp-hdiv-4{top:67%;animation:sp-fadein 1s 3.1s ease both}
.sp-hdiv-5{top:50%;animation:sp-fadein 1s 3.4s ease both;opacity:.5}
.sp-hdiv-6{top:12%;animation:sp-fadein 1s 2s ease both;opacity:.3}
.sp-hdiv-7{top:88%;animation:sp-fadein 1s 2.3s ease both;opacity:.3}

/* ── DIAGONAL ACCENT LINES ──────────────────────────── */
.sp-diag{position:absolute;pointer-events:none;width:1px;background:linear-gradient(to bottom,transparent,rgba(201,162,39,.06),transparent);z-index:1}
.sp-diag-1{height:350px;top:3%;left:22%;transform:rotate(15deg);animation:sp-fadein 1s 2s ease both}
.sp-diag-2{height:300px;top:8%;right:18%;transform:rotate(-12deg);animation:sp-fadein 1s 2.3s ease both}
.sp-diag-3{height:250px;bottom:3%;left:28%;transform:rotate(8deg);animation:sp-fadein 1s 2.6s ease both}
.sp-diag-4{height:320px;bottom:8%;right:22%;transform:rotate(-18deg);animation:sp-fadein 1s 2.9s ease both}
.sp-diag-5{height:200px;top:30%;left:8%;transform:rotate(25deg);animation:sp-fadein 1s 3.2s ease both}
.sp-diag-6{height:180px;top:35%;right:8%;transform:rotate(-20deg);animation:sp-fadein 1s 3.5s ease both}

/* ── GEOMETRIC DECORATIONS ──────────────────────────── */
.sp-geo{position:absolute;pointer-events:none;border:1px solid rgba(201,162,39,.05);z-index:1}
.sp-geo-circle{border-radius:50%;animation:sp-geo-rotate 20s linear infinite}
.sp-geo-square{animation:sp-geo-rotate 25s linear infinite reverse}
.sp-geo-hex{
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  animation:sp-hex-spin 30s linear infinite;
  border:none;
  background:linear-gradient(135deg,rgba(201,162,39,.03),transparent);
}
.sp-geo-1{width:220px;height:220px;top:3%;right:-50px;border-color:rgba(201,162,39,.04)}
.sp-geo-2{width:170px;height:170px;bottom:6%;left:-40px;border-color:rgba(200,200,255,.03)}
.sp-geo-3{width:120px;height:120px;top:58%;right:12%;border-color:rgba(201,162,39,.03);border-style:dashed}
.sp-geo-4{width:90px;height:90px;top:22%;left:12%;border-color:rgba(200,200,255,.025);border-style:dashed}
.sp-geo-5{width:140px;height:140px;bottom:22%;right:18%;border-color:rgba(201,162,39,.025)}
.sp-geo-6{width:80px;height:80px;top:70%;left:5%;border-color:rgba(201,162,39,.03)}
.sp-geo-7{width:100px;height:100px;top:8%;left:45%;border-color:rgba(200,200,255,.02)}
.sp-geo-8{width:60px;height:60px;bottom:40%;right:3%;border-color:rgba(201,162,39,.04);border-style:dotted}

/* ── ANIMATED CHART LINES ───────────────────────────── */
.sp-charts{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.sp-chart-line{fill:none;stroke-width:1.5;stroke-linecap:round;stroke-dasharray:2000;stroke-dashoffset:2000}
.sp-chart-1{stroke:rgba(201,162,39,.1);animation:sp-chart-draw 4s 1s ease forwards}
.sp-chart-2{stroke:rgba(201,162,39,.06);animation:sp-chart-draw 5s 1.5s ease forwards}
.sp-chart-3{stroke:rgba(200,200,255,.04);animation:sp-chart-draw 6s 2s ease forwards}
.sp-chart-4{stroke:rgba(200,200,255,.03);animation:sp-chart-draw 4.5s 2.5s ease forwards}
.sp-chart-5{stroke:rgba(100,180,255,.04);animation:sp-chart-draw 5.5s 3s ease forwards}
.sp-chart-6{stroke:rgba(180,100,255,.03);animation:sp-chart-draw 5s 3.5s ease forwards}
.sp-chart-dot{fill:#c9a227;opacity:0;animation:sp-dot-appear .5s ease both}
.sp-cd1{animation-delay:3.5s}.sp-cd2{animation-delay:3.8s}.sp-cd3{animation-delay:4.1s}.sp-cd4{animation-delay:4.4s}
.sp-cd5{animation-delay:4.7s}.sp-cd6{animation-delay:5s}.sp-cd7{animation-delay:5.3s}.sp-cd8{animation-delay:5.6s}
.sp-cd9{animation-delay:5.9s}.sp-cd10{animation-delay:6.2s}

/* ── SCANNING LINE EFFECT ───────────────────────────── */
.sp-scan-h{
  position:absolute;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,rgba(201,162,39,.08) 30%,rgba(201,162,39,.12) 50%,rgba(201,162,39,.08) 70%,transparent 95%);
  pointer-events:none;z-index:1;
  animation:sp-scan-line 6s linear infinite;
}

/* ── SCATTERED CATEGORY LABELS ──────────────────────── */
.sp-cat{position:absolute;font-size:10px;font-weight:600;font-family:'DM Sans',sans-serif;letter-spacing:3px;text-transform:uppercase;opacity:0;pointer-events:none;z-index:2}
.sp-cat-gold{color:rgba(201,162,39,.2)}
.sp-cat-light{color:rgba(200,200,255,.1)}
.sp-cat-1{top:10%;left:6%;animation:sp-cat-in .8s 2.5s ease both}
.sp-cat-2{top:16%;right:8%;animation:sp-cat-in .8s 2.8s ease both}
.sp-cat-3{bottom:20%;left:5%;animation:sp-cat-in .8s 3.1s ease both}
.sp-cat-4{bottom:13%;right:6%;animation:sp-cat-in .8s 3.4s ease both}
.sp-cat-5{top:32%;left:3%;animation:sp-cat-in .8s 3.7s ease both}
.sp-cat-6{top:40%;right:3%;animation:sp-cat-in .8s 4s ease both}
.sp-cat-7{bottom:36%;left:8%;animation:sp-cat-in .8s 4.3s ease both}
.sp-cat-8{bottom:30%;right:10%;animation:sp-cat-in .8s 4.6s ease both}
.sp-cat-9{top:24%;left:15%;animation:sp-cat-in .8s 4.9s ease both;font-size:8px;letter-spacing:2px}
.sp-cat-10{bottom:45%;right:15%;animation:sp-cat-in .8s 5.2s ease both;font-size:8px;letter-spacing:2px}

/* ── FLOATING FINANCIAL ICONS ───────────────────────── */
.sp-fi{position:absolute;pointer-events:none;opacity:0;animation:sp-fi-in .6s ease both;z-index:2}
.sp-fi svg{width:20px;height:20px;stroke:rgba(201,162,39,.1);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.sp-fi-1{top:7%;left:18%;animation-delay:3s}
.sp-fi-2{top:13%;right:22%;animation-delay:3.3s}
.sp-fi-3{bottom:16%;left:16%;animation-delay:3.6s}
.sp-fi-4{bottom:10%;right:20%;animation-delay:3.9s}
.sp-fi-5{top:48%;left:5%;animation-delay:4.2s}
.sp-fi-6{top:52%;right:5%;animation-delay:4.5s}
.sp-fi-7{top:25%;left:88%;animation-delay:4.8s}
.sp-fi-8{bottom:28%;left:88%;animation-delay:5.1s}
.sp-fi-9{top:70%;left:12%;animation-delay:5.4s}
.sp-fi-10{top:20%;left:85%;animation-delay:5.7s}

/* ── ORBITING DOTS ──────────────────────────────────── */
.sp-orbit-wrap{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;z-index:1;
}
.sp-orbit{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  border:1px dashed rgba(201,162,39,.06);
}
.sp-orbit-dot{
  position:absolute;width:5px;height:5px;
  background:rgba(201,162,39,.25);border-radius:50%;
  top:-2.5px;left:50%;margin-left:-2.5px;
  box-shadow:0 0 8px rgba(201,162,39,.2);
}
.sp-orbit-1{width:280px;height:280px;animation:sp-orbit 20s linear infinite}
.sp-orbit-2{width:380px;height:380px;animation:sp-orbit-reverse 28s linear infinite}
.sp-orbit-3{width:480px;height:480px;animation:sp-orbit 35s linear infinite}
.sp-orbit-dot-r{
  top:auto;bottom:-2.5px;
  background:rgba(100,160,255,.2);
  box-shadow:0 0 8px rgba(100,160,255,.15);
}

/* ── PROGRESS BAR (enhanced) ────────────────────────── */
.sp-bar{
  position:absolute;bottom:55px;left:50%;transform:translateX(-50%);
  width:300px;height:3px;
  background:rgba(200,200,255,.03);
  border-radius:2px;overflow:hidden;
  opacity:0;animation:sp-fadein .5s 3.5s ease both;
  z-index:3;
}
.sp-bar-fill{
  height:100%;width:0;
  background:linear-gradient(90deg,rgba(201,162,39,.2),#c9a227,rgba(201,162,39,.2));
  border-radius:2px;
  animation:sp-bar-grow 3s 3.8s cubic-bezier(.4,0,.6,1) forwards;
  box-shadow:0 0 12px rgba(201,162,39,.3),0 0 30px rgba(201,162,39,.1);
}

/* ── CENTRE BRANDING ────────────────────────────────── */
#mm-splash-center{
  position:relative;z-index:3;
  display:flex;flex-direction:column;
  align-items:center;
}

/* ── ₹ SYMBOL ──────────────────────────────────────── */
.sp-rupee-wrap{
  position:relative;
  margin-bottom:24px;
  opacity:0;
  animation:sp-rupee-in 1s 1.2s cubic-bezier(.23,1,.32,1) both,
             sp-glow-pulse 3s 2.5s ease-in-out infinite;
}
.sp-rupee{
  font-size:56px;font-weight:900;
  font-family:'Nunito',sans-serif;line-height:1;
  background:linear-gradient(135deg,#b8860b,#daa520,#ffd700,#daa520,#b8860b);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:sp-gold-shimmer 3s 2s ease-in-out infinite;
  filter:drop-shadow(0 2px 12px rgba(201,162,39,.35));
  position:relative;z-index:2;
}
.sp-rupee-ring{
  position:absolute;width:90px;height:90px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  border:1.5px solid rgba(201,162,39,.15);
  border-radius:50%;
  animation:sp-logo-breathe 4s ease-in-out infinite;
}
.sp-rupee-ring-2{
  position:absolute;width:110px;height:110px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  border:1px dashed rgba(201,162,39,.08);
  border-radius:50%;
  animation:sp-orbit 15s linear infinite;
}
.sp-rupee-glow{
  position:absolute;width:140px;height:140px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(201,162,39,.08),transparent 70%);
  border-radius:50%;
  animation:sp-logo-breathe 4s ease-in-out infinite;
}

/* ── THE WORD ───────────────────────────────────────── */
.sp-word{display:flex;align-items:baseline;gap:0;line-height:1}
.sp-letter{
  display:inline-block;font-size:76px;font-weight:800;
  color:#e8e6f0;font-family:'Nunito',sans-serif;
  letter-spacing:-3px;opacity:0;
  animation:sp-letter-in .8s cubic-bezier(.23,1,.32,1) both;
  text-shadow:0 0 30px rgba(200,200,255,.06);
}
.sp-letter:nth-child(1){animation-delay:.3s}
.sp-letter:nth-child(2){animation-delay:.4s}
.sp-letter:nth-child(3){animation-delay:.5s}
.sp-letter:nth-child(4){animation-delay:.6s}

<script>
(function(){
  var letters = document.querySelectorAll('.sp-letter');
  letters.forEach(function(el, i){
    el.addEventListener('animationend', function(){
      if(!el.classList.contains('done')){
        el.classList.add('done');
        el.style.opacity = '1';
        el.style.animation = '';
        void el.offsetWidth;
        el.style.animation = 'sp-letter-float 4s ease-in-out infinite';
        el.style.animationDelay = (i * 0.3) + 's';
      }
    });
  });

  var tagText = 'Financial Management Simplified';
  var tagContainer = document.getElementById('sp-tagline');
  if(tagContainer){
    for(var i = 0; i < tagText.length; i++){
      var span = document.createElement('span');
      span.className = 'sp-tag-char';
      span.textContent = tagText[i] === ' ' ? '\u00A0' : tagText[i];
      tagContainer.appendChild(span);
    }
  }

  var starsEl = document.getElementById('sp-stars');
  if(starsEl){
    for(var i = 0; i < 60; i++){
      var s = document.createElement('div');
      s.className = 'sp-star';
      s.style.left = (Math.random()*100) + '%';
      s.style.top = (Math.random()*100) + '%';
      s.style.setProperty('--twinkle', (2 + Math.random()*4) + 's');
      s.style.setProperty('--delay', (Math.random()*5) + 's');
      s.style.width = s.style.height = (1 + Math.random()*2) + 'px';
      starsEl.appendChild(s);
    }
  }

  var partEl = document.getElementById('sp-particles');
  if(partEl){
    for(var i = 0; i < 30; i++){
      var p = document.createElement('div');
      p.className = 'sp-particle';
      p.style.setProperty('--px', (Math.random()*100) + '%');
      p.style.setProperty('--py', (Math.random()*100) + '%');
      p.style.setProperty('--drift-x', (Math.random()*100 - 50) + 'px');
      p.style.setProperty('--drift-y', (Math.random()*-100 - 20) + 'px');
      p.style.setProperty('--dur', (6 + Math.random()*8) + 's');
      p.style.setProperty('--pdelay', (Math.random()*8) + 's');
      p.style.width = p.style.height = (2 + Math.random()*3) + 'px';
      p.style.opacity = (0.15 + Math.random()*0.3);
      partEl.appendChild(p);
    }
  }

  var tickerData = [
    {v:'TRACKING',u:true},{v:'EXPENSES',u:false},{v:'BUDGET',u:true},
    {v:'SAVINGS',u:true},{v:'INVESTMENTS',u:true},{v:'PORTFOLIO',u:false},
    {v:'ANALYTICS',u:true},{v:'REPORTS',u:false},{v:'PLANNING',u:true},
    {v:'DASHBOARD',u:true},{v:'INSIGHTS',u:true},{v:'TRENDS',u:true},
    {v:'GOALS',u:true},{v:'ALERTS',u:false},{v:'RECURRING',u:true},
    {v:'CATEGORIES',u:true}
  ];
  function buildTicker(container){
    if(!container) return;
    var html = '';
    for(var r = 0; r < 2; r++){
      for(var i = 0; i < tickerData.length; i++){
        var d = tickerData[i];
        html += '<span class="' + (d.u ? 'sp-t-up' : 'sp-t-down') + '">' + d.v + '</span>';
        html += '<span class="sp-t-sep"></span>';
      }
    }
    container.innerHTML = html;
  }
  buildTicker(document.getElementById('sp-ticker-top'));
  buildTicker(document.getElementById('sp-ticker-bottom'));

  var vLabels = ['ASSETS','LIABILITIES','EQUITY','DEBT','CASH','GROWTH','YIELD','RISK','RETURN','INDEX','FUND','BOND'];
  function buildVticker(container){
    if(!container) return;
    var html = '';
    for(var r = 0; r < 3; r++){
      for(var i = 0; i < vLabels.length; i++){
        html += '<span>' + vLabels[i] + '</span>';
      }
    }
    container.innerHTML = html;
  }
  buildVticker(document.getElementById('sp-vticker-l'));
  buildVticker(document.getElementById('sp-vticker-r'));

  var statuses = [
    'Initializing secure connection...',
    'Loading financial data...',
    'Syncing account balances...',
    'Processing market data...',
    'Building dashboard...',
    'Preparing analytics...',
    'Almost ready...'
  ];
  var statusEl = document.getElementById('sp-status');
  var statusIdx = 0;
  function cycleStatus(){
    if(!statusEl || statusIdx >= statuses.length) return;
    statusEl.style.opacity = '0';
    statusEl.style.transform = 'translateY(8px)';
    setTimeout(function(){
      if(statusEl){
        statusEl.textContent = statuses[statusIdx];
        statusEl.style.transition = 'opacity .3s,transform .3s';
        statusEl.style.opacity = '1';
        statusEl.style.transform = 'translateY(0)';
      }
    }, 200);
    statusIdx++;
    if(statusIdx < statuses.length) setTimeout(cycleStatus, 1800);
  }
  setTimeout(cycleStatus, 4000);

  var tlDots = document.querySelectorAll('.sp-tl-dot');
  var tlIdx = 0;
  function animateTimeline(){
    if(tlIdx >= tlDots.length) return;
    tlDots[tlIdx].classList.add('active');
    tlIdx++;
    if(tlIdx < tlDots.length) setTimeout(animateTimeline, 1200);
  }
  setTimeout(animateTimeline, 4500);
})();
</script>
