<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep navy to rich dark blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#05080f"/>
    </linearGradient>
    <!-- Accent glow gradient for the rupee symbol -->
    <linearGradient id="rupeeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <!-- Chart bar gradient -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0284c7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="barGradGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#22c55e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.16
                0 0 0 0 0.52
                0 0 0 0 0.78
                0 0 0 0 0.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Rounded rect clip -->
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- ── Subtle background glow ring ── -->
  <circle cx="256" cy="230" r="170" fill="none" stroke="#0284c7" stroke-width="1"
          stroke-opacity="0.12"/>
  <circle cx="256" cy="230" r="140" fill="none" stroke="#0284c7" stroke-width="0.5"
          stroke-opacity="0.08"/>

  <!-- ── Mini bar chart (bottom decoration) ── -->
  <!-- Bar 1 -->
  <rect x="80"  y="345" width="32" height="52" rx="5" fill="url(#barGrad)"    opacity="0.7"/>
  <!-- Bar 2 -->
  <rect x="122" y="317" width="32" height="80" rx="5" fill="url(#barGradGreen)" opacity="0.8"/>
  <!-- Bar 3 -->
  <rect x="164" y="333" width="32" height="64" rx="5" fill="url(#barGrad)"    opacity="0.65"/>
  <!-- Bar 4 -->
  <rect x="206" y="301" width="32" height="96" rx="5" fill="url(#barGradGreen)" opacity="0.85"/>
  <!-- Bar 5 -->
  <rect x="248" y="321" width="32" height="76" rx="5" fill="url(#barGrad)"    opacity="0.7"/>
  <!-- Bar 6 -->
  <rect x="290" y="289" width="32" height="108" rx="5" fill="url(#barGradGreen)" opacity="0.9"/>
  <!-- Bar 7 -->
  <rect x="332" y="305" width="32" height="92" rx="5" fill="url(#barGrad)"    opacity="0.75"/>
  <!-- Bar 8 -->
  <rect x="374" y="277" width="32" height="120" rx="5" fill="url(#barGradGreen)" opacity="0.95"/>

  <!-- ── Sparkline curve ── -->
  <polyline points="80,335 122,307 164,320 206,292 248,310 290,278 332,293 374,265 420,258"
            fill="none" stroke="#38bdf8" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <!-- Sparkline endpoint dot -->
  <circle cx="420" cy="258" r="5" fill="#38bdf8" opacity="0.7"/>

  <!-- ── Rupee ₹ symbol — centre, large, glowing ── -->
  <!-- Rendered as path for perfect control at all sizes -->
  <!-- ₹ Unicode path approximation: horizontal bars + vertical stem -->
  <text x="256" y="285"
        font-family="'Segoe UI', 'Noto Sans', Arial, sans-serif"
        font-size="210"
        font-weight="900"
        text-anchor="middle"
        fill="url(#rupeeGrad)"
        filter="url(#softGlow)"
        dominant-baseline="auto">₹</text>

  <!-- ── "finsight" wordmark ── -->
  <text x="256" y="458"
        font-family="'Segoe UI', 'Noto Sans', Arial, sans-serif"
        font-size="62"
        font-weight="800"
        text-anchor="middle"
        fill="#e0f2fe"
        letter-spacing="-1"
        opacity="0.92">finsight</text>

</svg>
