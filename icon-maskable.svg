<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#05080f"/>
    </linearGradient>
    <linearGradient id="rupeeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0284c7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="barGradGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#22c55e" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.16  0 0 0 0 0.52  0 0 0 0 0.78  0 0 0 0 0.45" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Full bleed background — maskable icons fill the entire square -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Safe zone: content within ~80% (approx 200px inset on each side → content 112..400) -->

  <!-- Subtle glow ring -->
  <circle cx="256" cy="230" r="130" fill="none" stroke="#0284c7"
          stroke-width="1" stroke-opacity="0.15"/>

  <!-- Mini bar chart — all within safe zone horizontally (x: 128..384) -->
  <rect x="128" y="328" width="24" height="44" rx="4" fill="url(#barGrad)"    opacity="0.7"/>
  <rect x="160" y="308" width="24" height="64" rx="4" fill="url(#barGradGreen)" opacity="0.8"/>
  <rect x="192" y="318" width="24" height="54" rx="4" fill="url(#barGrad)"    opacity="0.65"/>
  <rect x="224" y="296" width="24" height="76" rx="4" fill="url(#barGradGreen)" opacity="0.85"/>
  <rect x="256" y="310" width="24" height="62" rx="4" fill="url(#barGrad)"    opacity="0.7"/>
  <rect x="288" y="284" width="24" height="88" rx="4" fill="url(#barGradGreen)" opacity="0.9"/>
  <rect x="320" y="298" width="24" height="74" rx="4" fill="url(#barGrad)"    opacity="0.75"/>
  <rect x="352" y="272" width="24" height="100" rx="4" fill="url(#barGradGreen)" opacity="0.95"/>

  <!-- Sparkline -->
  <polyline points="128,320 160,300 192,310 224,288 256,302 288,272 320,285 352,262 388,254"
            fill="none" stroke="#38bdf8" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <circle cx="388" cy="254" r="4.5" fill="#38bdf8" opacity="0.65"/>

  <!-- Rupee symbol — within safe zone -->
  <text x="256" y="278"
        font-family="'Segoe UI', 'Noto Sans', Arial, sans-serif"
        font-size="175"
        font-weight="900"
        text-anchor="middle"
        fill="url(#rupeeGrad)"
        filter="url(#softGlow)"
        dominant-baseline="auto">₹</text>

  <!-- wordmark -->
  <text x="256" y="430"
        font-family="'Segoe UI', 'Noto Sans', Arial, sans-serif"
        font-size="52"
        font-weight="800"
        text-anchor="middle"
        fill="#e0f2fe"
        letter-spacing="-1"
        opacity="0.88">finsight</text>

</svg>
